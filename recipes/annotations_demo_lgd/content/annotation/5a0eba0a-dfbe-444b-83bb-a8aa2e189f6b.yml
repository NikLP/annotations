      value: "field_type: date_recur. Stores start/end datetimes plus an optional RRULE string for recurring events. The date_recur module generates occurrence rows in a separate table (date_recur__node__localgov_event_date) — queries for 'upcoming events' must join this table, not the field data table directly. The localgov_events Views display already handles this correctly via the date_recur_occurrences relationship."
