      value: 'Build the page body here using paragraph components. Start with the most important information — many residents will not scroll. Use text and media paragraphs for narrative content; use accordions for reference information residents may need to dig into (FAQs, eligibility criteria). Avoid adding components just to fill space: a focused page with two or three well-chosen components is more effective than one with eight.'
