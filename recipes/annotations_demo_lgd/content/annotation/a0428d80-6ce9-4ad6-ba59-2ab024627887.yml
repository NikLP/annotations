      value: 'All public-facing events must include an accessibility statement in the body. Minimum: confirm whether the venue has step-free access and state the nearest accessible parking or drop-off point. Events that cannot accommodate wheelchair users must include a contact number for alternative arrangements. This is a legal requirement under the Equality Act 2010.'
