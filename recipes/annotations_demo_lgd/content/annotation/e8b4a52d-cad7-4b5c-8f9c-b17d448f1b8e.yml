      value: 'Keep titles short enough to scan in a listing — aim for under 60 characters. Lead with the event name, not "Join us for…" or "Come and…". If the event recurs (e.g. a weekly market) use the standing name, not the specific date: "Scarfolk Farmers Market", not "Farmers Market 14 June".'
