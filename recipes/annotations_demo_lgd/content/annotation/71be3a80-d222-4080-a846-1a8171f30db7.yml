  value:
    -
      value: 'Use an accordion for reference content residents may need to look up but not read in full — eligibility criteria, FAQs, step-by-step processes with many steps. Do not use accordions just to compress a long page: if all the information is equally important, present it as flowing text instead. Each accordion pane should be self-contained; a resident opening just one pane should get a complete, useful answer.'
