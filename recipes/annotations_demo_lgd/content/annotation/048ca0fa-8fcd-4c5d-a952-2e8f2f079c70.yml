  value:
    -
      value: 'The primary banner is a full-width hero component intended for high-impact introductions — subsite home pages, major campaign landing pages. Use it once per page, at the top of the content area. The banner should communicate the purpose of the subsite at a glance; a resident arriving for the first time should immediately understand where they are and what they can do. Do not use it on every page within a subsite.'
