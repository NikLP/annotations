      value: 'Field type: list_string. Controls the HTML heading element (h2–h4) rendered for each accordion pane title. Choose the level that fits the document outline of the page — if the accordion title (localgov_title) is an h2, pane titles should be h3. Incorrect heading levels break document structure and harm screen-reader navigation; inspect the page heading hierarchy before selecting a value.'
