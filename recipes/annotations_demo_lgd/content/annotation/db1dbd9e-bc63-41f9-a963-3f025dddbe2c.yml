  value:
    -
      value: 'Choose a wide landscape image (minimum 1600 × 600 px recommended) with the main subject centred, as the image is cropped differently across breakpoints. Avoid images with text baked in — the banner title overlays the image and text-on-text is illegible. Ensure the image has sufficient contrast with the title overlay; dark or mid-tone images with a light area in the centre work best. Always provide meaningful alt text.'
