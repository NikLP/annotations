  value:
    -
      value: "All four time and quantity fields (cooking time, preparation time, number of servings, difficulty) must be populated before a recipe can go live. Images are required — a recipe without a hero image should not be published. Ingredient quantities must use consistent units: metric for all new content, imperial only when the recipe source uses it and conversion would be inaccurate. Do not duplicate recipes across categories; use the tags field for cross-cutting classification instead."
