      value: 'Step-by-step cooking instructions. Each step should describe exactly one action. Write in the imperative (Add the flour, not You should add). Do not cross-reference other recipes here. The final step should describe how to serve or plate the dish. This field supports basic HTML formatting — use ordered lists for sequential steps. Preparation notes that are not sequential instructions should go in the ingredients field instead.'
