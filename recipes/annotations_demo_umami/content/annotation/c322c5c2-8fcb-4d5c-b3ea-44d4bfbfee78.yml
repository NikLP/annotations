      value: 'Banner blocks are hero-style feature areas typically placed at the top of key pages. Each banner carries a title, a short summary, a call-to-action link, and a media image. Only one banner should be active per page region — multiple banners in the same region compete for the reader''s attention and dilute the primary call to action.'
