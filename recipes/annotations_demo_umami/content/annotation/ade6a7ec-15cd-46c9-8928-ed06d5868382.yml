      value: 'Cookbooks group related recipes into thematic collections for browsing and feature placement. Each cookbook should have a clear editorial angle — a cuisine, a season, a skill level, or a dietary theme — that makes the grouping meaningful to a reader. Cookbooks are editorial objects: they should be curated, not generated automatically from category tags.'
