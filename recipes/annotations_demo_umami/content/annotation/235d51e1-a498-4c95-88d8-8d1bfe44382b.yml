      value: "Set this to the realistic difficulty for a home cook with basic skills. Easy: no complex techniques, common equipment, under 30 minutes total. Medium: requires some timing coordination or specific technique (knife skills, emulsification, pastry). Hard: advanced technique, specialist equipment, or extended timing. When in doubt, rate one level higher — readers trust a recipe that turns out easier than advertised more than one that surprised them with complexity."
