      value: "Stored as an integer representing minutes. Covers cooking time only — time the food is actively being cooked, not total time including preparation. Rendered via a formatDuration filter in Twig which converts to 'X hr Y min' for values over 60. Minimum value enforced in validation is 1. Used by the recipe search API to support 'cook in under X minutes' filtering."
