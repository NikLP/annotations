      value: 'Integer, minutes. Covers all preparation steps before cooking begins: chopping, marinating, resting dough, bringing ingredients to room temperature. Does not include cooking time. The two time fields are summed in the Twig template to display a total time figure. If a recipe has no meaningful preparation phase, set this to 0 rather than leaving it blank.'
