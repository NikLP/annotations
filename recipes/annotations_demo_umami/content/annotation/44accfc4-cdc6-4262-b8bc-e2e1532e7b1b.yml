  value:
    -
      value: "Time in minutes spent preparing before cooking starts: chopping, measuring, marinating, resting dough. Round up rather than down — a rushed prep phase is stressful and leads to mistakes. If the recipe requires passive waiting (overnight marinating, slow-thaw), include that time here and note in the instructions that most of it is inactive. A reader planning their day needs the honest total."
