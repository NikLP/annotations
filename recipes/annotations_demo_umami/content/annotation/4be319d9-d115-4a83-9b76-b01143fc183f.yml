  value:
    -
      value: "Bundle: recipe (machine name). Provided by the demo_umami install profile. Stores structured culinary content: preparation and cooking time as integers (minutes), servings as integer, difficulty as a list string (easy/medium/hard), ingredients as plain text, recipe instructions as formatted long text, category as entity reference to recipe_category taxonomy, and tags as entity reference to the tags vocabulary. The cookbook relationship is owned by node__cookbook via field_cookbook_recipes — there is no back-reference field on recipe itself."
  revision_translation_affected:
    -
      value: true
