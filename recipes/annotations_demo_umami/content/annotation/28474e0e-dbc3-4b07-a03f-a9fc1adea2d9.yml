  value:
    -
      value: 'The number of portions the recipe produces as written. Express as a whole number. If the recipe is typically measured per item (cookies, muffins), give the yield count. Do not write ranges — pick the middle and round down. The servings figure appears prominently in the recipe header and influences how readers scale quantities mentally.'
