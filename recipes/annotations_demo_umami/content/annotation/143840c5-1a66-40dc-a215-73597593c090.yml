      value: 'Tags provide free-form, cross-cutting classification for recipes beyond the primary category. They are used for search refinement and related-recipes logic. Unlike categories, tags do not have landing pages and are not curated to a fixed list. Good tags describe attributes a reader might filter by: dietary requirements, cooking method, season, occasion.'
