      value: 'Recipe entries are the primary content type on an Umami site. Every recipe should be complete — all fields filled, ingredient quantities precise, and step counts verified — before the status is set to Published. Use the summary field to hook the reader in a single short paragraph; the full instruction set goes in the instructions field. A recipe that lacks a category, difficulty rating, or accurate timing is not ready to publish.'
