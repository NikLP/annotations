      value: "Active cooking time in minutes: the period the food is on heat, in the oven, or being actively worked. Do not include preparation time here. Be accurate rather than optimistic — a reader who finds the recipe takes longer than stated loses trust. Round to the nearest 5 minutes for recipes over 30 minutes. If the recipe has multiple cooking phases, sum them."
