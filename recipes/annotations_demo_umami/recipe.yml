name: 'Annotations demo (Umami)'
description: 'Demo annotations targeting Umami content types. Creates a Cookbook content type that entity-references Recipes, annotation targets for node__recipe, node__cookbook, taxonomy_term__recipe_category, and taxonomy_term__tags, and ~25 starter annotations covering all fields. Apply to a site running the demo_umami install profile.'
type: 'Demo content'

recipes:
  - annotations_demo_types

install:
  - annotations_overlay

config:
  strict:
    - node.type.cookbook
    - field.storage.node.field_cookbook_recipes
    - field.storage.node.field_cookbook_description
  actions:
    annotations.target_types:
      enableTargetType:
        - node
        - taxonomy_term
