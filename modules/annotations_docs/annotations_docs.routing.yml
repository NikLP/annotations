annotations_docs.page:
  path: '/annotations/documents'
  defaults:
    _controller: '\Drupal\annotations_docs\Controller\DocumentsController::page'
    _title: 'Annotations Documents'
  requirements:
    _custom_access: '\Drupal\annotations_docs\Controller\DocumentsController::accessPage'

annotations_docs.target:
  path: '/annotations/documents/{annotation_target}'
  defaults:
    _controller: '\Drupal\annotations_docs\Controller\DocumentsController::targetPanel'
    _title: 'Annotations Documents'
  requirements:
    _custom_access: '\Drupal\annotations_docs\Controller\DocumentsController::accessPage'
  options:
    parameters:
      annotation_target:
        type: entity:annotation_target

annotations_docs.generate:
  path: '/annotations/documents/generate/{annotation_target}'
  defaults:
    _form: '\Drupal\annotations_docs\Form\GenerateDocumentForm'
    _title: 'Generate document'
  requirements:
    _permission: 'generate annotation documents'
  options:
    parameters:
      annotation_target:
        type: entity:annotation_target
