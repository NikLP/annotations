annotations_context.api:
  path: '/api/annotations/{target_id}'
  defaults:
    _controller: '\Drupal\annotations_context\Controller\ContextApiController::endpoint'
    _title: 'Annotations context JSON'
  requirements:
    _permission: 'view annotations context+administer annotations'
    target_id: '[a-z0-9_]+'

annotations_context.preview:
  path: '/admin/config/annotations/context'
  defaults:
    _controller: '\Drupal\annotations_context\Controller\ContextPreviewController::page'
    _title: 'Annotations context preview'
  requirements:
    _permission: 'view annotations context+administer annotations'

# Raw markdown download. Accepts the same query params as the preview page.
annotations_context.export:
  path: '/admin/config/annotations/context/export'
  defaults:
    _controller: '\Drupal\annotations_context\Controller\ContextPreviewController::export'
    _title: 'Export context'
  requirements:
    _permission: 'view annotations context+administer annotations'
